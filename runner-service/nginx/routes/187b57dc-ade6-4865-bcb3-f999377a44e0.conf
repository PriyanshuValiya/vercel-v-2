server {
    listen 80;
    server_name temp-react.vercel.priyanshuvaliya.dev;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name temp-react.vercel.priyanshuvaliya.dev;

    ssl_certificate /etc/ssl/cloudflare/origin.pem;
    ssl_certificate_key /etc/ssl/cloudflare/origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass https://vercel-clone-priyanshu-valiya.s3.ap-south-1.amazonaws.com/187b57dc-ade6-4865-bcb3-f999377a44e0/;
        proxy_ssl_server_name on;
        proxy_set_header Host vercel-clone-priyanshu-valiya.s3.ap-south-1.amazonaws.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_intercept_errors on;
        error_page 404 = /index.html;
    }
}
