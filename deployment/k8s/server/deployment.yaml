apiVersion: apps/v1
kind: Deployment
metadata:
  name: server
  namespace: vercel
  labels:
    app: server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: server
  template:
    metadata:
      labels:
        app: server
    spec:
      containers:
        - name: server
          image: priyanshuvaliya18/vercel-server:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4500
          envFrom:
            - secretRef:
                name: secret-server
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"